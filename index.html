<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>♟️ Chesszerd — Hogyoku Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
        }
        #aizen-quote {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            color: #c71585;
            text-shadow: 0 0 10px rgba(199, 21, 133, 0.5);
            min-height: 40px;
            transition: color 0.5s ease;
        }
        #board-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 100px);
        }
        canvas {
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            background: #1a1a1a;
        }
        #status {
            text-align: center;
            padding: 10px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="aizen-quote">"Садись. Покажи мне свою волю."</div>
    <div id="board-container">
        <canvas id="board"></canvas>
    </div>
    <div id="status">♟️ Chesszerd Engine v1.0 | Hogyoku Core Active</div>

    <!-- Загрузка модулей -->
    <script type="module" src="main.js"></script>
</body>
</html>
