<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>♟️ Chesszerd</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟️</text></svg>">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#0a0a0a; color:#d4d4d4;
            font-family:-apple-system,BlinkMacSystemFont,'Courier New',monospace;
            height:100vh; width:100vw; overflow:hidden;
            display:flex; flex-direction:column;
            user-select:none; -webkit-user-select:none;
        }
        body.light { background:#f5f5dc; color:#333; }

        /* ПРИВЕТСТВИЕ */
        #welcome {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:radial-gradient(ellipse at center, #1a001a, #0a000a);
            display:flex; justify-content:center; align-items:center; z-index:1000;
            flex-direction:column;
        }
        #welcome.hidden { display:none; }
        #welcome img { width:150px; height:150px; border-radius:50%; border:3px solid #c71585; box-shadow:0 0 60px rgba(199,21,133,0.6); object-fit:cover; margin-bottom:20px; }
        #welcome h1 { font-size:28px; color:#c71585; text-shadow:0 0 20px rgba(199,21,133,0.7); margin:10px 0; }
        #welcome p { font-size:16px; color:#aaa; font-style:italic; margin:5px 0 20px; }
        #welcome button {
            background:linear-gradient(135deg,#c71585,#8b008b); color:white;
            border:none; padding:18px 60px; font-size:22px; font-family:'Courier New',monospace;
            border-radius:10px; cursor:pointer; box-shadow:0 0 40px rgba(199,21,133,0.4);
        }
        #welcome button:active { transform:scale(0.95); }

        /* ИГРОВОЙ ЭКРАН */
        #game { display:none; flex-direction:column; height:100%; }
        #game.active { display:flex; }

        /* ВКЛАДКИ TIKTOK-СТИЛЬ */
        #tabs {
            display:flex; background:#111; flex-shrink:0; overflow-x:auto;
            scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
        }
        #tabs::-webkit-scrollbar { display:none; }
        .tab {
            flex-shrink:0; scroll-snap-align:start;
            padding:12px 20px; color:#888; font-size:13px; cursor:pointer;
            border-bottom:2px solid transparent; transition:all 0.3s;
            white-space:nowrap; font-family:'Courier New',monospace;
        }
        .tab.active { color:#c71585; border-bottom-color:#c71585; }
        .tab:active { background:#222; }

        /* ЦИТАТА */
        #quote {
            text-align:center; padding:8px; font-size:13px; color:#c71585;
            text-shadow:0 0 8px rgba(199,21,133,0.4); min-height:30px; flex-shrink:0;
        }

        /* ДОСКА */
        #board-wrap { flex:1; display:flex; justify-content:center; align-items:center; padding:5px; }
        canvas {
            border-radius:6px; box-shadow:0 0 30px rgba(138,43,226,0.2);
            max-width:100%; max-height:100%; object-fit:contain;
        }

        /* СТАТУС */
        #status { text-align:center; padding:6px; color:#555; font-size:10px; flex-shrink:0; }
    </style>
</head>
<body>

<!-- ПРИВЕТСТВИЕ -->
<div id="welcome">
    <img src="data:image/jpeg;base64,PLACEHOLDER" alt="Айзен" id="aizen-img">
    <h1>CHESSZERD</h1>
    <p>"Добро пожаловать в шахматный полигон, боец."</p>
    <p style="color:#666; font-size:13px;">— Сосуке Айзен</p>
    <button onclick="startGame()">⚔️ ИГРАТЬ</button>
</div>

<!-- ИГРА -->
<div id="game">
    <!-- ВКЛАДКИ -->
    <div id="tabs">
        <div class="tab active" data-tab="play">♟️ Игра</div>
        <div class="tab" data-tab="train">📚 Обучение</div>
        <div class="tab" data-tab="daily">📅 Задача</div>
        <div class="tab" data-tab="profile">👤 Профиль</div>
        <div class="tab" data-tab="themes">🎨 Темы</div>
        <div class="tab" data-tab="settings">⚙️ Ещё</div>
    </div>
    
    <div id="quote">"Садись. Покажи мне свою волю."</div>
    
    <div id="board-wrap"><canvas id="board"></canvas></div>
    
    <div id="status">Выберите фигуру и сделайте ход</div>
</div>

<script type="module">
import { Board, getFrom, getTo } from './core/bitboard_engine.js';
import { BoardRenderer } from './ui/board_renderer.js';
import { AizenQuotes } from './ui/aizen_quotes.js';
import { AIEngine } from './search/ai_engine.js';
import { TrainingPanel } from './ui/training_panel.js';
import { PlayerProfile } from './features/player_profile.js';
import { DailyChallenges } from './features/daily_challenges.js';

// ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
window.board = null;
window.renderer = null;
window.quotes = null;
window.ai = null;
window.trainingPanel = null;
window.profile = null;
window.daily = null;
window.selected = -1;
window.legalMoves = [];

// ЗАГРУЗКА ФОТО АЙЗЕНА
fetch('img/aizen.jpg')
    .then(r => r.blob())
    .then(b => {
        const reader = new FileReader();
        reader.onload = () => document.getElementById('aizen-img').src = reader.result;
        reader.readAsDataURL(b);
    })
    .catch(() => {});

// ВКЛАДКИ
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabName = tab.dataset.tab;
        
        if (tabName === 'play') {
            // Ничего не делаем — игра уже открыта
        } else if (tabName === 'train') {
            if (window.trainingPanel) window.trainingPanel.show();
        } else if (tabName === 'daily') {
            if (!window.daily) window.daily = new DailyChallenges();
            window.daily.showPanel();
        } else if (tabName === 'profile') {
            if (!window.profile) window.profile = new PlayerProfile();
            window.profile.showPanel();
        } else if (tabName === 'themes') {
            if (window.renderer) {
                const themes = ['classic_dark','classic_light','marble','forest','metal','neon','vintage'];
                const current = window.renderer.theme;
                const idx = themes.indexOf(current);
                const next = themes[(idx + 1) % themes.length];
                window.renderer.setTheme(next);
                window.renderer.draw(window.board);
            }
        }
    });
});

// ЗАПУСК ИГРЫ
window.startGame = function() {
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('game').classList.add('active');
    initGame();
};

function initGame() {
    window.board = new Board();
    window.board.loadFEN('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
    
    window.renderer = new BoardRenderer(document.getElementById('board'));
    window.renderer.flipped = false;
    window.renderer.draw(window.board);
    
    window.quotes = new AizenQuotes();
    window.quotes.setElement(document.getElementById('quote'));
    window.quotes.showOpeningQuote();
    
    window.ai = new AIEngine(window.board, 2);
    window.trainingPanel = new TrainingPanel(window.board, window.ai, window.quotes);
    
    document.getElementById('status').textContent = 'Выберите фигуру и сделайте ход';
    
    setupTouchHandler();
}

// ПРЯМОЙ ОБРАБОТЧИК КАСАНИЙ (БЕЗ МОДУЛЯ)
function setupTouchHandler() {
    const canvas = document.getElementById('board');
    
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const sq = window.renderer.getSquareFromXY(x, y);
        if (sq >= 0 && sq < 64) handleClick(sq);
    });
    
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        const sq = window.renderer.getSquareFromXY(x, y);
        if (sq >= 0 && sq < 64) handleClick(sq);
    }, { passive: false });
}

function handleClick(square) {
    if (window.selected >= 0) {
        // Уже выбрана фигура — пробуем сделать ход
        const move = window.legalMoves.find(m => {
            const to = typeof m === 'number' ? (m >> 6) & 0x3F : m.to;
            return to === square;
        });
        
        if (move) {
            // ДЕЛАЕМ ХОД
            window.board.makeMove(move);
            window.renderer.selectedSquare = -1;
            window.renderer.legalMoves = [];
            window.renderer.draw(window.board, { 
                from: typeof move === 'number' ? move & 0x3F : move.from, 
                to: typeof move === 'number' ? (move >> 6) & 0x3F : move.to 
            });
            window.selected = -1;
            window.legalMoves = [];
            
            document.getElementById('status').textContent = 'ИИ думает...';
            
            setTimeout(() => {
                const aiMove = window.ai.findBestMove();
                if (aiMove) {
                    window.board.makeMove(aiMove);
                    window.renderer.draw(window.board);
                    window.quotes.showPressureQuote();
                    document.getElementById('status').textContent = 'Ваш ход';
                }
            }, 400);
            
            return;
        }
        
        // Нажали на другую свою фигуру
        if (isMyPiece(square)) {
            window.selected = -1;
            window.legalMoves = [];
            window.renderer.selectedSquare = -1;
            window.renderer.legalMoves = [];
            window.renderer.draw(window.board);
            selectPiece(square);
            return;
        }
        
        // Нажали мимо — отмена
        window.selected = -1;
        window.legalMoves = [];
        window.renderer.selectedSquare = -1;
        window.renderer.legalMoves = [];
        window.renderer.draw(window.board);
    } else {
        selectPiece(square);
    }
}

function selectPiece(square) {
    if (!isMyPiece(square)) return;
    
    window.selected = square;
    window.renderer.selectedSquare = square;
    
    // Генерируем легальные ходы
    const allMoves = window.board.generatePseudoMoves();
    const fromMoves = allMoves.filter(m => (m & 0x3F) === square);
    
    window.legalMoves = [];
    for (const move of fromMoves) {
        const saved = saveState();
        window.board.makeMove(move);
        if (!window.board.inCheck()) window.legalMoves.push(move);
        restoreState(saved);
    }
    
    window.renderer.legalMoves = window.legalMoves;
    window.renderer.draw(window.board);
}

function isMyPiece(square) {
    const us = window.board.active_color;
    const bb = 1n << BigInt(square);
    for (let type = 0; type < 6; type++) {
        if ((window.board.pieces[type * 2 + us] & bb) !== 0n) return true;
    }
    return false;
}

function saveState() {
    return {
        pieces: window.board.pieces.map(p => p),
        occupied: [window.board.occupied[0], window.board.occupied[1]],
        all_occupied: window.board.all_occupied,
        active_color: window.board.active_color,
        en_passant: window.board.en_passant_square,
        castling: window.board.castling_rights
    };
}

function restoreState(s) {
    window.board.pieces = s.pieces.map(p => p);
    window.board.occupied = [s.occupied[0], s.occupied[1]];
    window.board.all_occupied = s.all_occupied;
    window.board.active_color = s.active_color;
    window.board.en_passant_square = s.en_passant;
    window.board.castling_rights = s.castling;
}
</script>
</body>
</html>
