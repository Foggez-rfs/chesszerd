<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>♟️ Chesszerd — Hogyoku Engine</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟️</text></svg>">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background:#0a0a0a; color:#d4d4d4;
            font-family:-apple-system,BlinkMacSystemFont,'Courier New',monospace;
            height:100vh; width:100vw; overflow:hidden;
            display:flex; flex-direction:column;
            user-select:none; -webkit-user-select:none; touch-action:none;
        }
        body.light { background:#f5f5dc; color:#333; }

        /* ПРИВЕТСТВЕННЫЙ ЭКРАН */
        #welcome-screen {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:radial-gradient(ellipse at center, #1a001a, #0a000a);
            display:flex; justify-content:center; align-items:center; z-index:1000;
            flex-direction:column; animation:fadeIn 1.5s ease;
        }
        #welcome-screen.hidden { display:none; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        
        /* CSS-ПОРТРЕТ АЙЗЕНА */
        .aizen-portrait {
            width: 150px; height: 150px;
            position: relative;
            margin-bottom: 20px;
        }
        .aizen-face {
            width: 120px; height: 140px;
            background: linear-gradient(180deg, #f5d5c8 0%, #e8c0b0 100%);
            border-radius: 50% 50% 45% 45%;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 0 40px rgba(199,21,133,0.4);
        }
        .aizen-hair {
            position: absolute;
            top: -15px; left: -10px;
            width: 140px; height: 80px;
            background: linear-gradient(180deg, #3a1a0a 0%, #5a2a1a 100%);
            border-radius: 50% 50% 0 0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .aizen-hair::after {
            content: '';
            position: absolute;
            top: 40px; left: 30px;
            width: 80px; height: 50px;
            background: #3a1a0a;
            border-radius: 0 0 50% 50%;
        }
        .aizen-glasses {
            position: absolute;
            top: 45px; left: 15px;
            width: 90px; height: 25px;
        }
        .aizen-glasses::before,
        .aizen-glasses::after {
            content: '';
            position: absolute;
            width: 35px; height: 22px;
            border: 2px solid #333;
            border-radius: 5px;
        }
        .aizen-glasses::before { left: 0; }
        .aizen-glasses::after { left: 50px; }
        .aizen-glasses-bridge {
            position: absolute;
            top: 10px; left: 35px;
            width: 20px; height: 2px;
            background: #333;
        }
        .aizen-eyes {
            position: absolute;
            top: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        .aizen-eye {
            width: 6px; height: 6px;
            background: #333;
            border-radius: 50%;
        }
        .aizen-smile {
            position: absolute;
            bottom: 35px; left: 50%;
            transform: translateX(-50%);
            width: 25px; height: 8px;
            border-bottom: 2px solid #333;
            border-radius: 0 0 50% 50%;
        }

        .welcome-title {
            font-size:28px; color:#c71585;
            text-shadow:0 0 20px rgba(199,21,133,0.7);
            margin:15px 0 10px; letter-spacing:2px;
        }
        .welcome-quote { font-size:16px; color:#aaa; font-style:italic; margin-bottom:5px; }
        .welcome-author { font-size:13px; color:#666; margin-bottom:30px; }
        .play-btn {
            background:linear-gradient(135deg,#c71585,#8b008b); color:white;
            border:none; padding:18px 60px; font-size:22px;
            font-family:'Courier New',monospace; border-radius:10px;
            cursor:pointer; box-shadow:0 0 40px rgba(199,21,133,0.4);
            letter-spacing:3px; font-weight:bold;
        }
        .play-btn:active { transform:scale(0.95); }

        /* ИГРОВОЙ ЭКРАН */
        #game-screen { display:none; flex-direction:column; height:100%; }
        #game-screen.active { display:flex; }

        #top-bar {
            display:flex; justify-content:space-between; align-items:center;
            padding:10px 15px; background:#111; flex-shrink:0;
        }
        body.light #top-bar { background:#e0d5c1; }
        #top-bar button {
            background:#333; color:#d4d4d4; border:1px solid #555;
            padding:8px 12px; border-radius:6px;
            font-family:'Courier New',monospace; font-size:12px; cursor:pointer;
            margin-left:4px;
        }
        body.light #top-bar button { background:#d4c4a8; color:#333; border-color:#999; }
        #top-bar button:active { background:#555; }
        #btn-train { background:linear-gradient(135deg,#8b008b,#c71585); border:1px solid #c71585; }

        #aizen-quote {
            text-align:center; padding:10px; font-size:14px; color:#c71585;
            text-shadow:0 0 8px rgba(199,21,133,0.4); min-height:35px; flex-shrink:0;
        }

        #board-container {
            flex:1; display:flex; justify-content:center; align-items:center; padding:5px;
        }
        canvas {
            border-radius:6px; box-shadow:0 0 30px rgba(138,43,226,0.2);
            max-width:100%; max-height:100%; object-fit:contain;
        }
        body.light canvas { box-shadow:0 0 20px rgba(0,0,0,0.15); }

        #status { text-align:center; padding:8px; color:#555; font-size:11px; flex-shrink:0; }
        #debug { text-align:center; padding:4px; color:#888; font-size:10px; min-height:18px; }
    </style>
</head>
<body>
    <!-- ПРИВЕТСТВЕННЫЙ ЭКРАН -->
    <div id="welcome-screen">
        <div class="aizen-portrait">
            <div class="aizen-face">
                <div class="aizen-hair"></div>
                <div class="aizen-glasses">
                    <div class="aizen-glasses-bridge"></div>
                </div>
                <div class="aizen-eyes">
                    <div class="aizen-eye"></div>
                    <div class="aizen-eye"></div>
                </div>
                <div class="aizen-smile"></div>
            </div>
        </div>
        <div class="welcome-title">CHESSZERD</div>
        <div class="welcome-quote">"Добро пожаловать в шахматный полигон, боец."</div>
        <div class="welcome-author">— Сосуке Айзен</div>
        <button class="play-btn" onclick="startGame()">⚔️ ИГРАТЬ ⚔️</button>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="game-screen">
        <div id="top-bar">
            <span style="color:#c71585; font-weight:bold;">♟️ Chesszerd</span>
            <div>
                <button id="btn-train" onclick="openTraining()">📚 Обучение</button>
                <button onclick="toggleTheme()">🌓</button>
                <button onclick="resetBoard()">🔄</button>
                <button onclick="goWelcome()">🏠</button>
            </div>
        </div>
        <div id="aizen-quote">"Садись. Покажи мне свою волю."</div>
        <div id="board-container">
            <canvas id="board"></canvas>
        </div>
        <div id="debug">Нажмите на фигуру</div>
        <div id="status">Выберите фигуру и сделайте ход</div>
    </div>

    <script type="module">
        import { Board } from './core/bitboard_engine.js';
        import { BoardRenderer } from './ui/board_renderer.js';
        import { TouchHandler } from './ui/touch_handler.js';
        import { AizenQuotes } from './ui/aizen_quotes.js';
        import { AIEngine } from './search/ai_engine.js';
        import { TrainingPanel } from './ui/training_panel.js';

        let board, renderer, touchHandler, quotes, ai, trainingPanel;

        function debug(msg) {
            const el = document.getElementById('debug');
            if (el) el.textContent = msg;
        }

        function initGame() {
            debug('Инициализация...');
            
            board = new Board();
            board.loadFEN('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
            
            quotes = new AizenQuotes();
            quotes.setElement(document.getElementById('aizen-quote'));
            quotes.showOpeningQuote();
            
            ai = new AIEngine(board, 2);
            
            // Загружаем сохранённые веса
            const saved = localStorage.getItem('hogyoku_weights');
            if (saved) {
                try {
                    ai.nn.importWeights(JSON.parse(saved));
                    console.log('✅ Веса нейросети загружены');
                } catch(e) {}
            }
            
            const canvas = document.getElementById('board');
            renderer = new BoardRenderer(canvas);
            renderer.flipped = false;
            renderer.draw(board);
            
            trainingPanel = new TrainingPanel(board, ai, quotes);
            
            touchHandler = new TouchHandler(canvas, board, renderer, (move) => {
                document.getElementById('status').textContent = 'ИИ думает...';
                setTimeout(() => {
                    const aiMove = ai.findBestMove();
                    if (aiMove) {
                        board.makeMove(aiMove);
                        renderer.draw(board);
                        quotes.showPressureQuote();
                        document.getElementById('status').textContent = 'Ваш ход';
                    }
                }, 400);
            });
            
            debug('Готов. Кликните на белую фигуру.');
            document.getElementById('status').textContent = 'Выберите фигуру и сделайте ход';
        }

        window.startGame = function() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.add('active');
            if (!board) setTimeout(initGame, 100);
            else renderer.draw(board);
        };

        window.goWelcome = function() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('welcome-screen').classList.remove('hidden');
        };

        window.toggleTheme = function() {
            document.body.classList.toggle('light');
            if (renderer) {
                renderer.setTheme(document.body.classList.contains('light') ? 'light' : 'dark');
                renderer.draw(board);
            }
        };

        window.resetBoard = function() {
            if (board) {
                board.loadFEN('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
                renderer.selectedSquare = -1;
                renderer.legalMoves = [];
                renderer.flipped = false;
                renderer.draw(board);
                quotes.showOpeningQuote();
                debug('Доска сброшена. Ваш ход.');
            }
        };

        window.openTraining = function() {
            if (trainingPanel) trainingPanel.show();
        };

        window.closeTraining = function() {
            if (trainingPanel) trainingPanel.hide();
        };

        window.trainOnPGN = function() {
            if (trainingPanel) trainingPanel.train();
        };
    </script>
</body>
</html>
